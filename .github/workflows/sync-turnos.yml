name: Sincronizar Turnos desde FTP

on:
  schedule:
    # Corre cada 6 horas (puedes ajustar esta frecuencia)
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Permite ejecutar manualmente la sincronización desde la interfaz de GitHub

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci || npm install

      - name: Ejecutar script de sincronización
        run: node scripts/sync-ftp.js
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_DIR: ${{ secrets.FTP_DIR }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
